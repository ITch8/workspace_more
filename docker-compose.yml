version: '3'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: replyboost
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d replyboost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    image: w_m-app:latest
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/replyboost?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me_in_dev}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: w_m-app:latest
    build: .
    command:
      [
        "sh",
        "-c",
        "pnpm prisma migrate deploy && exec pnpm run worker:csv"
      ]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/replyboost?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_started
    restart: unless-stopped

  dbgate:
    image: dbgate/dbgate
    ports:
      - "3001:3000"
    environment:
      CONNECTIONS: replyboost
      LABEL_replyboost: ReplyBoost Local
      SERVER_replyboost: db
      PORT_replyboost: 5432
      USER_replyboost: postgres
      PASSWORD_replyboost: postgres
      ENGINE_replyboost: postgres@dbgate-plugin-postgres
      DATABASE_replyboost: replyboost
    volumes:
      - ./dbgate-data:/root/.dbgate
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
